name: Build Android APK

on:
  workflow_dispatch: # Gives you a manual button to start the build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Setup-Gradle System
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK via Cloud Compiler
        run: gradle assembleDebug
